<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2С35 Коалиция-СВ</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }
      #hud {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; font-family: 'Courier New', monospace; color: #0f0;
      }
      #crosshair {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 30px; height: 30px; border: 2px solid rgba(0,255,0,0.6); border-radius: 50%;
        display: none;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: rgba(0,255,0,0.6);
      }
      #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
      #crosshair::after { height: 1px; width: 100%; top: 50%; left: 0; }
      #info-panel {
        position: absolute; top: 20px; left: 20px;
        background: rgba(0,20,0,0.7); border: 1px solid #0f0;
        padding: 15px; font-size: 14px; line-height: 1.8;
        min-width: 280px;
      }
      #target-panel {
        position: absolute; top: 20px; right: 20px;
        background: rgba(0,20,0,0.7); border: 1px solid #0f0;
        padding: 15px; font-size: 13px; line-height: 1.6;
        min-width: 260px;
      }
      #mode-label {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,20,0,0.8); border: 1px solid #0f0;
        padding: 8px 20px; font-size: 16px; pointer-events: auto;
      }
      .target-item { margin-bottom: 8px; padding: 4px 0; border-bottom: 1px solid rgba(0,255,0,0.2); }
      .target-item.marked { color: #ff0; }
      .target-item.active { color: #f00; }
      .highlight { color: #ff0; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="crosshair"></div>
      <div id="info-panel">
        <div>ГАУБИЦА: 2С35 «Коалиция-СВ»</div>
        <div>Ветер: <span id="wind-info">2 м/с ←</span></div>
        <div>Влажность: <span id="humidity-info">70%</span></div>
        <div>Азимут: <span id="azimuth">0°</span></div>
        <div>Угол: <span id="elevation">0°</span></div>
        <div>Скорость: <span id="speed-info">0</span>%</div>
        <div id="distance-info"></div>
      </div>
      <div id="target-panel">
        <div style="margin-bottom:8px; text-decoration:underline;">ЦЕЛИ</div>
        <div id="targets-list"></div>
      </div>
      <div id="mode-label">НАБЛЮДЕНИЕ [Tab — прицел] [WASD — движение]</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
